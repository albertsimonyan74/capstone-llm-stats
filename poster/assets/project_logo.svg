<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <rect width="48" height="48" rx="10" fill="#0A0E1A"/>
  <rect width="48" height="48" rx="10" fill="none" stroke="#00FFE0" stroke-width="1.5" opacity="0.6"/>
  <text x="24" y="33" text-anchor="middle" font-family="monospace" font-size="22" font-weight="900" fill="#00FFE0" filter="url(#glow)" letter-spacing="-1">BB</text>
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00CED1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0047AB;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Hexagon outer -->
  <polygon points="40,4 72,22 72,58 40,76 8,58 8,22"
           fill="none" stroke="url(#grad)" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  <!-- Inner triangle -->
  <polygon points="40,18 60,50 20,50"
           fill="none" stroke="#00FFFF" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Center dot -->
  <circle cx="40" cy="40" r="5" fill="url(#grad)" filter="url(#glow)"/>
  <!-- Corner dots -->
  <circle cx="40" cy="18" r="2.5" fill="#00CED1" opacity="0.9"/>
  <circle cx="60" cy="50" r="2.5" fill="#00CED1" opacity="0.9"/>
  <circle cx="20" cy="50" r="2.5" fill="#00CED1" opacity="0.9"/>
  <!-- Connecting lines from center -->
  <line x1="40" y1="40" x2="40" y2="18" stroke="#00BFFF" stroke-width="0.8" opacity="0.5"/>
  <line x1="40" y1="40" x2="60" y2="50" stroke="#00BFFF" stroke-width="0.8" opacity="0.5"/>
  <line x1="40" y1="40" x2="20" y2="50" stroke="#00BFFF" stroke-width="0.8" opacity="0.5"/>
</svg>
